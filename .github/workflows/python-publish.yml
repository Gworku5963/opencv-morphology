name: OpenCV Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python numpy matplotlib
    
    - name: Run morphological operations
      run: |
        python lightweight.py
    
    - name: Upload output images
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: morphological-output
        path: |
          output_*.png
          *.png
